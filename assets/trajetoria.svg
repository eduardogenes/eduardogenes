  <text x="1152" y="36" text-anchor="end" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" letter-spacing="2" fill="#6b645a">OPERAÇÃO, DADOS E PROCESSO <tspan fill="#B25400">→ CÓDIGO</tspan></text>
  <rect x="48" y="48" width="1104" height="1" fill="#1E1A14" fill-opacity="0.45"><animate attributeName="width" values="0;1104" dur="0.8s" fill="freeze"/></rect>
