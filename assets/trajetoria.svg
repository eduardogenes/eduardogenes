    <circle cx="178" cy="264" r="5" fill="#FAF8F5" stroke="#1E1A14" stroke-width="2"/>
    <text x="200" y="270" font-family="Space Grotesk, Arial, sans-serif" font-size="17" font-weight="600" fill="#1E1A14">Articulador Fiscal — Casa Civil / COPOL</text>
    <text x="200" y="291" font-family="Georgia, Times New Roman, serif" font-style="italic" font-size="14" fill="#565046">auditorias, documentos e prazos — a base da atenção ao detalhe.</text>
  </g><g opacity="1"><animate attributeName="opacity" values="0;0;1" keyTimes="0;0.63;1" dur="2s" fill="freeze"/>
