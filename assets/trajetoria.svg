    <text x="200" y="233" font-family="Georgia, Times New Roman, serif" font-style="italic" font-size="14" fill="#565046">automatizei cálculos de reservas — a primeira ferramenta interna que virou código de verdade.</text>
  </g><g opacity="1"><animate attributeName="opacity" values="0;0;1" keyTimes="0;0.51;1" dur="2s" fill="freeze"/>
