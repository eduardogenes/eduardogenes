    <text x="200" y="96" font-family="Space Grotesk, Arial, sans-serif" font-size="17" font-weight="600" fill="#1E1A14">Desenvolvedor Full Stack — IMTS Group</text><rect x="556" y="81" width="60" height="20" rx="10" fill="none" stroke="#B25400" stroke-width="1.2"/><text x="586" y="95" text-anchor="middle" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="10.5" letter-spacing="1" fill="#B25400">ATUAL</text>
    <text x="200" y="117" font-family="Georgia, Times New Roman, serif" font-style="italic" font-size="14" fill="#565046">plataforma de ensino multitenant em produção em colégios pelo Brasil — experiência do aluno do zero.</text>
  </g><g opacity="1"><animate attributeName="opacity" values="0;0;1" keyTimes="0;0.27;1" dur="2s" fill="freeze"/>
    <text x="160" y="153" text-anchor="end" font-family="JetBrains Mono, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" letter-spacing="0.5" fill="#565046">2025 →</text>
    <circle cx="178" cy="148" r="5" fill="#FAF8F5" stroke="#1E1A14" stroke-width="2"/>
    <text x="200" y="154" font-family="Space Grotesk, Arial, sans-serif" font-size="17" font-weight="600" fill="#1E1A14">Desenvolvedor Web — freelance</text>
    <text x="200" y="175" font-family="Georgia, Times New Roman, serif" font-style="italic" font-size="14" fill="#565046">sites e produtos no ar pra clientes reais — design, código, domínio e SEO, de ponta a ponta.</text>
  </g><g opacity="1"><animate attributeName="opacity" values="0;0;1" keyTimes="0;0.39;1" dur="2s" fill="freeze"/>
