name: commits somados
on:
  schedule:
    - cron: "23 3 * * *"   # todo dia, 00:23 em Fortaleza
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: node scripts/build-commits.mjs
      - name: commit se mudou
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/commits.svg
          git diff --staged --quiet || git commit -m "chore: commits.svg diário"
          git push
